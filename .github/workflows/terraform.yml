name: Terraform

on:
  pull_request:
    paths: ['infrastructure/terraform/**']

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  plan:
    name: terraform plan (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      - name: fmt
        run: terraform -chdir=infrastructure/terraform/environments/${{ matrix.env }} fmt -check -recursive
      - name: init
        run: terraform -chdir=infrastructure/terraform/environments/${{ matrix.env }} init -backend=false
      - name: validate
        run: terraform -chdir=infrastructure/terraform/environments/${{ matrix.env }} validate
