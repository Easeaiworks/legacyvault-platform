version: '3.9'

# Local development stack. Production runs on AWS (RDS, ElastiCache, S3).
# Start:    docker compose up -d
# Stop:     docker compose down
# Reset DB: docker compose down -v

services:
  postgres:
    image: postgres:16.2-alpine
    container_name: legacyvault_postgres
    environment:
      POSTGRES_USER: legacyvault
      POSTGRES_PASSWORD: legacyvault
      POSTGRES_DB: legacyvault
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U legacyvault']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: legacyvault_redis
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    container_name: legacyvault_minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - '9000:9000'   # S3 API
      - '9001:9001'   # Web console
    command: server /data --console-address ':9001'
    volumes:
      - miniodata:/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: legacyvault_mailhog
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # Web UI

volumes:
  pgdata:
  miniodata:
